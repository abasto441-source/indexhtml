<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NRAM360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --c:#75C5D5;--cd:#4A9BAB;--cl:#E8F7FA;--cm:#B8E5ED;
  --gd:#3C3C3B;--nt:#232323;
  --bg:#F4F5F6;--bg2:#fff;--bg3:#ECEEF0;
  --bo:#D8DADC;--bo2:#C4C7CA;
  --t1:#232323;--t2:#5A5C5E;--t3:#8A8C8E;
  --ok:#2EAB7B;--ok2:#E6F7F0;
  --wa:#D97B00;--wa2:#FEF3E2;
  --er:#D43F3F;--er2:#FDEAEA;
  --in:#185FA5;--in2:#E6F1FB;
  --r:8px;--rl:12px;--rx:16px;
  --sh:0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:14px}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--gd);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.lc{background:#fff;border-radius:var(--rx);padding:36px 32px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.llogo{text-align:center;margin-bottom:26px}
.lbrand{font-size:28px;font-weight:700;color:var(--nt);letter-spacing:-1px}.lbrand span{color:var(--c)}
.ltag{font-size:12px;color:var(--t3);margin-top:4px}

.lf .fg{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.lf label{font-size:12px;color:var(--t2);font-weight:500}
.lf input{padding:10px 12px;border:1px solid var(--bo);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--t1);background:#fff}
.lf input:focus{outline:none;border-color:var(--c)}
.lbtn{width:100%;padding:11px;background:var(--c);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px}
.lbtn:hover,.lbtn:active{background:var(--cd)}
.lerr{font-size:12px;color:var(--er);text-align:center;margin-top:8px;display:none}
.ldemo{margin-top:14px;font-size:11px;color:#AAA;text-align:center;line-height:1.6}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
#app.vis{display:flex}

/* ── TOPBAR ── */
.tb{background:var(--gd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;flex-shrink:0}
.tbrand{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.5px}.tbrand span{color:var(--c)}
.tbr{display:flex;align-items:center;gap:10px}
.tbu{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.8)}
.tbu i{font-size:18px;color:var(--cm)}
.tbrole{font-size:11px;background:var(--c);color:#fff;padding:2px 8px;border-radius:99px;font-weight:500}
.lgout{padding:5px 11px;font-size:12px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;font-family:'DM Sans',sans-serif}
.lgout:hover{background:rgba(255,255,255,.1);color:#fff}
/* mobile menu btn */
.mbtn{display:none;background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
.sb{width:196px;background:var(--bg2);border-right:1px solid var(--bo);padding:10px 8px;overflow-y:auto;flex-shrink:0;transition:transform .25s}
.sc{font-size:10px;color:var(--t3);padding:10px 8px 4px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.si{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--t2);border:none;background:transparent;width:100%;text-align:left;transition:all .12s;font-family:'DM Sans',sans-serif}
.si:hover,.si.on{background:var(--cl);color:var(--cd);font-weight:500}
.si.on i,.si:hover i{color:var(--c)}
.si i{font-size:16px;width:18px;flex-shrink:0;color:var(--t3)}
.sbx{font-size:11px;padding:2px 6px;border-radius:99px;margin-left:auto;font-weight:500}
/* badge colors */
.bg{background:var(--ok2);color:#1A7A55}.ba{background:var(--wa2);color:var(--wa)}.br{background:var(--er2);color:var(--er)}.bb{background:var(--in2);color:var(--in)}.bgy{background:var(--bg3);color:var(--t2)}.bc{background:var(--cl);color:var(--cd)}

/* overlay for mobile sidebar */
.sbover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50}
.sbover.vis{display:block}

/* ── CONTENT ── */
.ct{flex:1;padding:18px;overflow-y:auto;background:var(--bg)}

/* ── CARD / TABLE ── */
.card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--rl);padding:15px;margin-bottom:14px;box-shadow:var(--sh)}
.ctit{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;color:var(--nt);flex-wrap:wrap;gap:8px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.pt{font-size:18px;font-weight:600;color:var(--nt)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.met{background:var(--bg2);border-radius:var(--rl);padding:13px;border:1px solid var(--bo)}
.ml{font-size:12px;color:var(--t2);margin-bottom:5px}
.mv{font-size:21px;font-weight:600;color:var(--nt)}
.ms{font-size:11px;color:var(--t3);margin-top:2px}
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--bo)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{text-align:left;padding:9px 10px;color:var(--t2);font-weight:500;border-bottom:1px solid var(--bo);font-size:12px;background:var(--bg3);white-space:nowrap}
td{padding:10px 10px;border-bottom:1px solid var(--bo);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.pb{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:3px;min-width:60px}
.pf{height:100%;border-radius:99px}
.ar{display:flex;gap:5px;flex-wrap:wrap}
.ib{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--bo);background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--t2);font-size:15px;transition:all .12s;flex-shrink:0}
.ib:hover{background:var(--bg3);color:var(--t1)}
.toggle{width:34px;height:18px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--c)}.toggle.off{background:var(--bo)}
.toggle::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;transition:left .2s}
.toggle.on::after{left:19px}.toggle.off::after{left:3px}

/* ── BUTTONS ── */
.btn{padding:7px 13px;font-size:13px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bo);background:#fff;color:var(--t1);display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg3)}
.bp{background:var(--c);color:#fff;border-color:var(--c)}.bp:hover{background:var(--cd);border-color:var(--cd)}
.bd{background:var(--er);color:#fff;border-color:var(--er)}.bd:hover{background:#B03030}
.bsuc{background:var(--ok);color:#fff;border-color:var(--ok)}
.bwa{background:#25D366;color:#fff;border-color:#25D366}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:12px;color:var(--t2);font-weight:500}
.fg input,.fg select,.fg textarea{padding:8px 11px;font-size:13px;border:1px solid var(--bo);border-radius:var(--r);background:#fff;color:var(--t1);font-family:'DM Sans',sans-serif;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--c)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.fr{grid-template-columns:1fr}}

/* ── STATUS ROWS ── */
.dbr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bo);font-size:13px;gap:8px}
.dbr:last-child{border-bottom:none}
.sd{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dg{background:var(--ok)}.da{background:var(--wa)}.dr{background:var(--er)}.dgy{background:#AAA}

/* ── TICKETS ── */
.tc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:background .12s}
.tc:hover{background:var(--bg3)}
.tk-o{border-left:3px solid var(--er)}.tk-p{border-left:3px solid var(--wa)}.tk-c{border-left:3px solid var(--ok)}

/* ── PAY CARDS ── */
.payw{background:var(--bg2);border:1px solid var(--bo);border-left:3px solid var(--wa);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;margin-bottom:10px}
.payok{background:var(--bg2);border:1px solid var(--bo);border-left:3px solid var(--ok);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;margin-bottom:10px}
.payer{background:var(--bg2);border:1px solid var(--bo);border-left:3px solid var(--er);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;margin-bottom:10px}

/* ── TIMELINE ── */
.tl{display:flex;flex-direction:column;gap:12px}
.tli{display:flex;gap:10px;align-items:flex-start;font-size:13px}
.tld{width:8px;height:8px;border-radius:50%;background:var(--c);flex-shrink:0;margin-top:5px}
.tld.w{background:var(--wa)}.tld.e{background:var(--er)}
.tlt{font-size:11px;color:var(--t3);margin-top:2px}

/* ── INFO BOXES ── */
.ibox{background:var(--cl);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--cd);margin-bottom:10px}
.wbox{background:var(--wa2);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--wa)}
.ebox{background:var(--er2);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--er);text-align:center}

/* ── QR ── */
.qrbox{background:#fff;border:1px solid var(--bo);border-radius:var(--r);padding:6px;display:inline-block}
.qrbox canvas,.qrbox img{display:block}
.qr-upload{border:2px dashed var(--bo2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:border .15s;position:relative;overflow:hidden}
.qr-upload:hover{border-color:var(--c)}
.qr-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.qr-img-preview{width:100px;height:100px;object-fit:cover;border-radius:var(--r);border:1px solid var(--bo)}

/* ── MODAL ── */
#mw{display:none;position:fixed;inset:0;background:rgba(35,35,35,.55);z-index:2000;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto}
#mw.open{display:flex}
.modal{background:#fff;border-radius:var(--rx);border:1px solid var(--bo);padding:22px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);margin:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt2{font-size:15px;font-weight:600;color:var(--nt)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.g2{grid-template-columns:1fr}}

/* ── EXPIRY ALERT ROW ── */
.exp-row{background:#fff;border:1px solid var(--bo);border-radius:var(--r);padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.exp-row.urgent{border-left:3px solid var(--er)}
.exp-row.soon{border-left:3px solid var(--wa)}

/* ── MOBILE ── */
@media(max-width:768px){
  .sb{position:fixed;top:50px;left:0;bottom:0;z-index:60;transform:translateX(-100%);width:220px}
  .sb.open{transform:translateX(0)}
  .mbtn{display:block}
  .ct{padding:14px}
  .ph{margin-bottom:14px}
  .pt{font-size:16px}
  table{font-size:12px}
  th,td{padding:8px 8px}
  .met{padding:11px}
  .mv{font-size:18px}
}
@media(max-width:380px){
  .lc{padding:26px 20px}
  .modal{padding:16px}
}
code{font-family:'DM Mono',monospace;font-size:11.5px;background:var(--bg3);padding:2px 7px;border-radius:4px;color:var(--gd)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lc">
    <div class="llogo">
      <div class="lbrand">NRAM<span>360</span></div>
      <div class="ltag">Panel de gestión SaaS</div>
    </div>

    <div class="lf">
      <div class="fg"><label>Correo</label><input type="email" id="lem" placeholder="correo@nram360.io" autocomplete="username"></div>
      <div class="fg"><label>Contraseña</label><input type="password" id="lps" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="lbtn" onclick="doLogin()">Ingresar <i class="ti ti-arrow-right"></i></button>
      <div class="lerr" id="lerr">Credenciales incorrectas.</div>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="tb">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="mbtn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
      <div class="tbrand">NRAM<span>360</span></div>
    </div>
    <div class="tbr">
      <div class="tbu"><i class="ti ti-user-circle"></i><span id="tbU">–</span></div>
      <span class="tbrole" id="tbR">–</span>
      <button class="lgout" onclick="doLogout()"><i class="ti ti-logout" style="font-size:13px"></i> Salir</button>
    </div>
  </div>
  <div class="layout">
    <div class="sbover" id="sbover" onclick="closeSidebar()"></div>
    <div class="sb" id="sb"></div>
    <div class="ct" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div id="mw"><div class="modal">
  <div class="mh"><span class="mt2" id="mt2">–</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div id="mbody"></div>
</div></div>

<script>
// ══════════════════════════════════
// DATA
// ══════════════════════════════════
const S={
  role:null,user:null,view:null,loginRole:'superadmin',
  qrMode:'generate', // 'generate' | 'image'
  qrImageDataUrl: null,
  qr:{alias:'NRAM360 Bolivia',bank:'Banco Unión',account:'1234567890',currency:'BOB'},
  plans:[
    {id:1,name:'Starter',price:79,ram:1024,disk:10,desc:'Ideal para PYMES'},
    {id:2,name:'Professional',price:149,ram:2048,disk:20,desc:'Empresas en crecimiento'},
    {id:3,name:'Enterprise',price:299,ram:4096,disk:50,desc:'Grandes operaciones'},
  ],
  companies:[
    {id:1,name:'Distribuidora Alfa',domain:'alfa.nram360.io',plan:'Professional',status:'active',ram:2048,ramUsed:1340,disk:20,diskUsed:11.2,db:'alfa_prod',version:'17.0',ip:'10.0.1.2',ssl:true,backups:true,nextPayment:'2025-05-20',amount:149,created:'2024-01-15',wa:'59171234567',notes:'Cliente desde ene 2024',adminEmail:'alfa@nram360.io',adminPass:'alfa123'},
    {id:2,name:'Tech Solutions LLC',domain:'tech.nram360.io',plan:'Starter',status:'active',ram:1024,ramUsed:610,disk:10,diskUsed:4.8,db:'tech_prod',version:'17.0',ip:'10.0.1.3',ssl:true,backups:false,nextPayment:'2025-06-01',amount:79,created:'2024-03-02',wa:'59172345678',notes:'',adminEmail:'tech@nram360.io',adminPass:'tech123'},
    {id:3,name:'Constructora Norteña',domain:'norte.nram360.io',plan:'Enterprise',status:'suspended',ram:4096,ramUsed:0,disk:50,diskUsed:23.1,db:'norte_prod',version:'16.0',ip:'10.0.1.4',ssl:false,backups:true,nextPayment:'2025-05-16',amount:299,created:'2023-11-08',wa:'59173456789',notes:'Suspendido por pago vencido',adminEmail:'norte@nram360.io',adminPass:'norte123'},
    {id:4,name:'Café Digital Ltda.',domain:'cafe.nram360.io',plan:'Starter',status:'disabled',ram:1024,ramUsed:0,disk:10,diskUsed:2.1,db:'cafe_prod',version:'17.0',ip:'10.0.1.5',ssl:false,backups:false,nextPayment:'—',amount:79,created:'2024-05-20',wa:'59174567890',notes:'Cuenta cancelada',adminEmail:'cafe@nram360.io',adminPass:'cafe123'},
  ],
  payments:[
    {id:'PAY-001',cid:1,company:'Distribuidora Alfa',plan:'Professional',amount:149,date:'2025-05-01',ref:'TRF-8821',status:'approved',voucher:'comprobante_mayo.jpg',note:'Pago QR mayo'},
    {id:'PAY-002',cid:2,company:'Tech Solutions LLC',plan:'Starter',amount:79,date:'2025-05-03',ref:'TRF-9012',status:'pending',voucher:'voucher_ts.png',note:'Pendiente revisión'},
    {id:'PAY-003',cid:3,company:'Constructora Norteña',plan:'Enterprise',amount:299,date:'2025-04-20',ref:'',status:'pending',voucher:'',note:'Sin comprobante'},
    {id:'PAY-004',cid:4,company:'Café Digital Ltda.',plan:'Starter',amount:79,date:'2025-03-01',ref:'',status:'rejected',voucher:'',note:'Cuenta cancelada'},
  ],
  tickets:[
    {id:'TK-001',cid:1,company:'Distribuidora Alfa',subject:'Error exportar reportes PDF',status:'open',priority:'high',date:'2025-05-13',msg:'Al generar reportes en PDF aparece error 500. Urgente.'},
    {id:'TK-002',cid:2,company:'Tech Solutions LLC',subject:'Solicito más espacio en disco',status:'pending',priority:'mid',date:'2025-05-12',msg:'Necesitamos ampliar el disco a 20GB.'},
    {id:'TK-003',cid:3,company:'Constructora Norteña',subject:'Reactivar cuenta suspendida',status:'open',priority:'high',date:'2025-05-11',msg:'Ya realizamos el pago, favor reactivar.'},
    {id:'TK-004',cid:1,company:'Distribuidora Alfa',subject:'Consulta sobre backup',status:'closed',priority:'low',date:'2025-05-08',msg:'¿Cada cuánto se realizan los backups automáticos?'},
  ],
  _nextPid:5,_nextTid:5
};

// ══════════════════════════════════
// AUTH
// ══════════════════════════════════
const CREDS={
  superadmin:{email:'super@nram360.io',pass:'super123',name:'Super Admin'},
  admin:null // dynamic from companies
};



function doLogin(){
  const em=document.getElementById('lem').value.trim().toLowerCase();
  const ps=document.getElementById('lps').value.trim();
  let user=null;
  // Auto-detect: primero intenta superadmin, luego admin/cliente
  if(em===CREDS.superadmin.email&&ps===CREDS.superadmin.pass){
    user={role:'superadmin',name:CREDS.superadmin.name,email:em};
  } else {
    const co=S.companies.find(c=>c.adminEmail===em&&c.adminPass===ps);
    if(co) user={role:'admin',name:co.name,email:em,cid:co.id};
  }
  if(!user){document.getElementById('lerr').style.display='block';return;}
  document.getElementById('lerr').style.display='none';
  S.role=user.role; S.user=user;
  S.view=user.role==='superadmin'?'dashboard':'my-dash';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.add('vis');
  document.getElementById('tbU').textContent=user.name;
  document.getElementById('tbR').textContent=user.role==='superadmin'?'Super Admin':'Admin / Cliente';
  render();
}

function doLogout(){
  S.role=null;S.user=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').classList.remove('vis');
  document.getElementById('lem').value='';
  document.getElementById('lps').value='';
}

// ══════════════════════════════════
// SIDEBAR
// ══════════════════════════════════
function toggleSidebar(){
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('sbover').classList.toggle('vis');
}
function closeSidebar(){
  document.getElementById('sb').classList.remove('open');
  document.getElementById('sbover').classList.remove('vis');
}

const SA_MENU=[
  {s:'Principal'},
  {id:'dashboard',ic:'ti-dashboard',lb:'Dashboard'},
  {id:'companies',ic:'ti-building',lb:'Empresas',bd:()=>S.companies.length},
  {id:'databases',ic:'ti-database',lb:'Bases de datos'},
  {s:'Infraestructura'},
  {id:'docker',ic:'ti-brand-docker',lb:'Docker'},
  {id:'domains',ic:'ti-world',lb:'Dominios & SSL'},
  {id:'backups',ic:'ti-database-export',lb:'Backups'},
  {id:'monitor',ic:'ti-activity',lb:'Monitoreo'},

function sbadge(s){return{active:'<span class="sbx bg">Activo</span>',suspended:'<span class="sbx ba">Suspendido</span>',disabled:'<span class="sbx bgy">Inhabilitado</span>'}[s]||s;}
function pbadge(s){return{approved:'<span class="sbx bg">Aprobado</span>',pending:'<span class="sbx ba">Pendiente</span>',rejected:'<span class="sbx br">Rechazado</span>'}[s]||s;}
function tbadge(s){return{open:'<span class="sbx br">Abierto</span>',pending:'<span class="sbx ba">Pendiente</span>',closed:'<span class="sbx bg">Cerrado</span>'}[s]||s;}
function dot(s){return`<span class="sd ${{active:'dg',suspended:'da',disabled:'dgy'}[s]||'dgy'}"></span>`;}
function getCo(){return S.user&&S.user.cid?S.companies.find(c=>c.id===S.user.cid):S.companies[0];}

function daysUntil(dateStr){
  if(!dateStr||dateStr==='—')return 9999;
  const d=new Date(dateStr),n=new Date();n.setHours(0,0,0,0);
  return Math.round((d-n)/(1000*60*60*24));
}

function render(){
  const menu=S.role==='superadmin'?SA_MENU:CL_MENU;
  document.getElementById('sb').innerHTML=menu.map(m=>{
    if(m.s)return`<div class="sc">${m.s}</div>`;
    const b=m.bd?m.bd():null;
    return`<button class="si${S.view===m.id?' on':''}" onclick="nav('${m.id}')"><i class="ti ${m.ic}"></i>${m.lb}${b?`<span class="sbx bc">${b}</span>`:''}</button>`;
  }).join('');
  const views={
    dashboard:vDash,companies:vCo,databases:vDB,docker:vDock,
    domains:vDom,backups:vBack,monitor:vMon,plans:vPlans,
    payments:vPay,tickets:vTix,
    'my-dash':vMyDash,'my-server':vMyServ,'my-res':vMyRes,
    'my-dom':vMyDom,'my-pay':vMyPay,'my-tix':vMyTix,
  };
  document.getElementById('content').innerHTML=(views[S.view]||vDash)();
  setTimeout(genQRs,120);
}

function genQRs(){
  if(S.qrMode==='image')return;
  document.querySelectorAll('.qr-gen').forEach(el=>{
    if(el.children.length>0)return;
    try{const v=el.dataset.val||`${S.qr.alias}|${S.qr.bank}|${S.qr.account}|${S.qr.currency}`;
    new QRCode(el,{text:v,width:100,height:100,colorDark:'#3C3C3B',colorLight:'#fff'});}catch(e){}
  });
}

function qrHTML(size=100){
  if(S.qrMode==='image'&&S.qrImageDataUrl){
    return`<img src="${S.qrImageDataUrl}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:var(--r)">`;
  }
  return`<div class="qr-gen" data-val="${S.qr.alias}|${S.qr.bank}|${S.qr.account}|${S.qr.currency}"></div>`;
}

  </div>
</div>
<div id="qrTabImgBody" style="display:${S.qrMode==='image'?'block':'none'}">
  <div class="qr-upload" onclick="document.getElementById('qrFileIn').click()">
    <input type="file" id="qrFileIn" accept="image/*" onchange="previewQRImage(this)">
    ${S.qrMode==='image'&&S.qrImageDataUrl
      ?`<img src="${S.qrImageDataUrl}" class="qr-img-preview" style="margin:0 auto 8px">`
      :`<i class="ti ti-photo" style="font-size:32px;color:var(--t3);display:block;margin-bottom:8px"></i>`}
    <div style="font-size:13px;color:var(--t2)">${S.qrMode==='image'&&S.qrImageDataUrl?'Haz clic para cambiar la imagen':'Haz clic para subir tu imagen QR'}</div>

  </div>
  <div id="qrImgPreview" style="text-align:center;margin-top:10px;display:${S.qrMode==='image'&&S.qrImageDataUrl?'block':'none'}">

  </div>
</div>

function switchQRTab(tab){
  S.qrMode=tab;
  document.getElementById('qrTabGen').className='btn'+(tab==='generate'?' bp':'');
  document.getElementById('qrTabImg').className='btn'+(tab==='image'?' bp':'');
  document.getElementById('qrTabGenBody').style.display=tab==='generate'?'block':'none';
  document.getElementById('qrTabImgBody').style.display=tab==='image'?'block':'none';
  if(tab==='generate')setTimeout(genQRs,100);
}

function previewQRImage(input){
  const f=input.files[0];
  if(!f)return;
  if(f.size>2*1024*1024){alert('La imagen no debe superar 2MB');return;}
  const rd=new FileReader();
  rd.onload=e=>{
    S.qrImageDataUrl=e.target.result;
    const prev=document.getElementById('qrImgPrev');
    const prevD=document.getElementById('qrImgPreview');
    if(prev){prev.src=S.qrImageDataUrl;prevD.style.display='block';}
  };
  rd.readAsDataURL(f);
}

function saveQR(){
  if(S.qrMode==='generate'){
    const g=id=>document.getElementById(id)?.value;
    if(g('qr_bank'))S.qr.bank=g('qr_bank');
    if(g('qr_alias'))S.qr.alias=g('qr_alias');
    if(g('qr_acc'))S.qr.account=g('qr_acc');
    if(g('qr_cur'))S.qr.currency=g('qr_cur');
  }
  closeModal();render();
}
